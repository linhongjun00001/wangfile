<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D工位图管理系统</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="css/floor-map.css">
    <link rel="stylesheet" href="css/navbar.css">
    <link rel="stylesheet" href="css/bottom-bar.css">
    <link rel="stylesheet" href="css/modal.css">
    <link rel="stylesheet" href="css/admin.css">
    <!-- Supabase Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.min.js"></script>
    <!-- QRCode.js -->
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
</head>
<body>
    <!-- 顶部导航栏 -->
    <header id="navbar" class="navbar">
        <div class="navbar-brand">
            <h1>3D工位图</h1>
        </div>
        <div class="navbar-controls">
            <select id="floor-select" class="floor-select">
                <option value="">选择园区/区域</option>
            </select>
            <div class="search-box">
                <input type="text" id="search-input" placeholder="搜索员工姓名...">
                <button id="search-btn" class="icon-btn">🔍</button>
            </div>
        </div>
    </header>

    <!-- 主内容区域 -->
    <main id="main-container" class="main-container">
        <!-- 工位图容器 -->
        <div id="floor-map-wrapper" class="floor-map-wrapper">
            <div id="floor-map-container" class="floor-map-container">
                <svg id="floor-map" class="floor-map" viewBox="0 0 1000 800" preserveAspectRatio="xMidYMid meet">
                    <defs>
                        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
                            <feDropShadow dx="2" dy="4" stdDeviation="3" flood-opacity="0.3"/>
                        </filter>
                        <filter id="glow">
                            <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
                            <feMerge>
                                <feMergeNode in="coloredBlur"/>
                                <feMergeNode in="SourceGraphic"/>
                            </feMerge>
                        </filter>
                    </defs>
                    <image id="floor-bg-image" href="" x="0" y="0" width="1000" height="800" preserveAspectRatio="none"/>
                    <g id="areas-layer"></g>
                    <g id="seats-layer"></g>
                    <g id="labels-layer"></g>
                </svg>
            </div>
        </div>

        <!-- 搜索面板 -->
        <div id="search-panel" class="search-panel hidden">
            <div class="search-header">
                <h3>搜索结果</h3>
                <button id="close-search" class="close-btn">×</button>
            </div>
            <div id="search-results" class="search-results"></div>
        </div>
    </main>

    <!-- 底部操作栏 -->
    <footer id="bottom-bar" class="bottom-bar">
        <div class="bottom-bar-left">
            <span id="connection-status" class="connection-status offline" title="连接状态">
                <span class="status-dot"></span>
                <span class="status-text">离线</span>
            </span>
            <button id="refresh-btn" class="action-btn" title="刷新数据">🔄</button>
            <button id="test-connection-btn" class="action-btn" title="测试连接">🔗</button>
        </div>
        <div class="bottom-bar-center">
            <span id="sync-info" class="sync-info"></span>
        </div>
        <div class="bottom-bar-right">
            <button id="qr-code-btn" class="action-btn" title="生成二维码">📱</button>
            <button id="upload-bg-btn" class="action-btn admin-only hidden" title="上传底图">🖼️</button>
            <button id="add-seat-btn" class="action-btn admin-only hidden" title="添加工位">➕</button>
            <button id="enter-admin-btn" class="action-btn" title="进入管理模式">🔐</button>
            <button id="exit-admin-btn" class="action-btn hidden" title="退出管理模式">🔓</button>
        </div>
    </footer>

    <!-- 通知容器 -->
    <div id="notification-container" class="notification-container"></div>

    <!-- 员工信息弹窗 -->
    <div id="employee-modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-title">员工信息</h3>
                <button class="close-btn" data-close-modal="employee-modal">×</button>
            </div>
            <div class="modal-body">
                <div id="employee-info" class="employee-info">
                    <div class="employee-avatar-section">
                        <img id="info-avatar" class="employee-avatar" src="" alt="员工头像" style="display:none;">
                        <div id="info-avatar-placeholder" class="employee-avatar-placeholder">👤</div>
                    </div>
                    <div class="info-row">
                        <label>工位编号:</label>
                        <span id="info-seat-number"></span>
                    </div>
                    <div class="info-row">
                        <label>姓名:</label>
                        <span id="info-name"></span>
                    </div>
                    <div class="info-row">
                        <label>部门:</label>
                        <span id="info-department"></span>
                    </div>
                    <div class="info-row">
                        <label>电话:</label>
                        <span id="info-phone"></span>
                    </div>
                    <div class="info-row">
                        <label>状态:</label>
                        <span id="info-status"></span>
                    </div>
                </div>
                <form id="employee-form" class="employee-form hidden">
                    <input type="hidden" id="edit-seat-id">
                    <div class="form-group">
                        <label>工位编号</label>
                        <input type="text" id="edit-seat-number" required>
                    </div>
                    <div class="form-group">
                        <label>姓名</label>
                        <input type="text" id="edit-name">
                    </div>
                    <div class="form-group">
                        <label>部门</label>
                        <input type="text" id="edit-department">
                    </div>
                    <div class="form-group">
                        <label>电话</label>
                        <input type="text" id="edit-phone">
                    </div>
                    <div class="form-group">
                        <label>状态</label>
                        <select id="edit-status">
                            <option value="available">空闲</option>
                            <option value="occupied">占用</option>
                            <option value="maintenance">维修</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>区域</label>
                        <select id="edit-area"></select>
                    </div>
                    <div class="form-group">
                        <label>员工头像</label>
                        <div class="avatar-upload">
                            <input type="file" id="edit-avatar-input" accept="image/*" capture="environment" hidden>
                            <div id="edit-avatar-preview" class="avatar-preview" title="点击上传头像">
                                <img id="edit-avatar-img" src="" alt="预览" style="display:none;">
                                <span id="edit-avatar-placeholder">👤<br>点击上传头像</span>
                            </div>
                            <button type="button" id="upload-avatar-btn" class="btn btn-secondary">选择头像文件</button>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button id="delete-seat-btn" class="btn btn-danger admin-only hidden">删除</button>
                <button id="edit-seat-btn" class="btn btn-primary admin-only hidden">编辑</button>
                <button id="save-seat-btn" class="btn btn-success hidden">保存</button>
                <button id="cancel-edit-btn" class="btn btn-secondary hidden">取消</button>
            </div>
        </div>
    </div>

    <!-- 登录弹窗 -->
    <div id="login-modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3>管理员登录</h3>
                <button class="close-btn" data-close-modal="login-modal">×</button>
            </div>
            <div class="modal-body">
                <form id="login-form">
                    <div class="form-group">
                        <label>邮箱</label>
                        <input type="email" id="login-email" value="admin@workstation.com" required>
                    </div>
                    <div class="form-group">
                        <label>密码</label>
                        <input type="password" id="login-password" placeholder="请输入密码" required>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button id="login-submit-btn" class="btn btn-primary">登录</button>
            </div>
        </div>
    </div>

    <!-- 二维码弹窗 -->
    <div id="qr-modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3>访问二维码</h3>
                <button class="close-btn" data-close-modal="qr-modal">×</button>
            </div>
            <div class="modal-body">
                <div id="qr-code-container"></div>
                <p class="qr-hint">扫描二维码访问当前页面</p>
            </div>
            <div class="modal-footer">
                <button id="download-qr-btn" class="btn btn-primary">下载二维码</button>
            </div>
        </div>
    </div>

    <!-- 区域管理弹窗 -->
    <div id="area-modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3>区域管理</h3>
                <button class="close-btn" data-close-modal="area-modal">×</button>
            </div>
            <div class="modal-body">
                <div id="area-list" class="area-list"></div>
                <form id="area-form" class="area-form">
                    <div class="form-group">
                        <label>区域名称</label>
                        <input type="text" id="area-name" required>
                    </div>
                    <div class="form-group">
                        <label>颜色</label>
                        <input type="color" id="area-color" value="#3b82f6">
                    </div>
                    <button type="button" id="add-area-btn" class="btn btn-primary">添加区域</button>
                </form>
            </div>
        </div>
    </div>

    <!-- 底图上传弹窗 -->
    <div id="upload-modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3>上传底图</h3>
                <button class="close-btn" data-close-modal="upload-modal">×</button>
            </div>
            <div class="modal-body">
                <div class="upload-area" id="upload-area">
                    <input type="file" id="bg-image-input" accept="image/*" hidden>
                    <div class="upload-placeholder">
                        <span class="upload-icon">📁</span>
                        <p>点击或拖拽上传底图</p>
                        <p class="upload-hint">支持 JPG, PNG 格式，建议小于 5MB</p>
                    </div>
                </div>
                <div id="upload-preview" class="upload-preview hidden">
                    <img id="preview-image" src="" alt="预览">
                </div>
            </div>
            <div class="modal-footer">
                <button id="confirm-upload-btn" class="btn btn-primary hidden">确认上传</button>
            </div>
        </div>
    </div>

    <!-- 核心框架 -->
    <script src="js/core/event-bus.js"></script>
    <script src="js/core/state.js"></script>
    <script src="js/core/router.js"></script>

    <!-- 工具函数 -->
    <script src="js/utils/debounce.js"></script>
    <script src="js/utils/validators.js"></script>
    <script src="js/utils/qr-generator.js"></script>

    <!-- 服务层 -->
    <script src="js/config.js"></script>
    <script src="js/services/db.js"></script>
    <script src="js/services/supabase.js"></script>
    <script src="js/services/sync.js"></script>
    <script src="js/services/auth.js"></script>

    <!-- 组件 -->
    <script src="js/components/Notification.js"></script>
    <script src="js/components/Navbar.js"></script>
    <script src="js/components/BottomBar.js"></script>
    <script src="js/components/FloorMap.js"></script>
    <script src="js/components/EmployeeModal.js"></script>
    <script src="js/components/LoginModal.js"></script>
    <script src="js/components/QRCodeModal.js"></script>
    <script src="js/components/AreaManager.js"></script>
    <script src="js/components/ImageUploader.js"></script>
    <script src="js/components/SearchPanel.js"></script>

    <!-- 应用入口 -->
    <script src="js/app.js"></script>
</body>
</html>
